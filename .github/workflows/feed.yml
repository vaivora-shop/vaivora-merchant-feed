name: Generate Google Merchant feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Generate products.xml
        shell: bash
        run: |
          cat > /tmp/generate_feed.py <<'PY'
          import hashlib
          import html
          import json
          import re
          import time
          from decimal import Decimal, InvalidOperation
          from pathlib import Path
          from urllib.parse import urljoin, urlparse

          import requests
          from bs4 import BeautifulSoup
          from lxml import etree

          SITEMAP = "https://vaivora.shop/sitemap.xml"
          SHOP_URL = "https://vaivora.shop/"
          OUTPUT = Path("public/products.xml")
          GNS = "http://base.google.com/ns/1.0"

          session = requests.Session()
          session.headers.update({
              "User-Agent": "Mozilla/5.0 (compatible; VaivoraMerchantFeed/1.0; +https://vaivora.shop/)",
              "Accept-Language": "lt-LT,lt;q=0.9,en;q=0.7",
          })

          def txt(v):
              if v is None:
                  return ""
              if isinstance(v, list):
                  return " ".join(txt(x) for x in v)
              if isinstance(v, dict):
                  return txt(v.get("name") or v.get("@value"))
              return re.sub(r"\s+", " ", html.unescape(str(v))).strip()

          def clean_desc(v, fallback):
              s = txt(v) or fallback
              s = BeautifulSoup(s, "html.parser").get_text(" ", strip=True)
              return re.sub(r"\s+", " ", s).strip()[:5000]

          def price(v, currency="EUR"):
              raw = txt(v).replace(",", ".")
              m = re.search(r"\d+(?:\.\d+)?", raw)
              if not m:
                  return None
              try:
                  n = Decimal(m.group(0)).quantize(Decimal("0.01"))
              except InvalidOperation:
                  return None
              return f"{n} {currency.upper()}"

          def availability(v):
              s = txt(v).lower().rstrip("/").split("/")[-1].replace("-", "").replace(" ", "")
              return {
                  "instock": "in_stock",
                  "limitedavailability": "in_stock",
                  "outofstock": "out_of_stock",
                  "soldout": "out_of_stock",
                  "preorder": "preorder",
                  "backorder": "backorder",
              }.get(s, "in_stock")

          def objects(v):
              if isinstance(v, dict):
                  yield v
                  for x in v.values():
                      if isinstance(x, (dict, list)):
                          yield from objects(x)
              elif isinstance(v, list):
                  for x in v:
                      yield from objects(x)

          def is_product(d):
              t = d.get("@type")
              if isinstance(t, list):
                  return any(str(x).lower() == "product" for x in t)
              return str(t).lower() == "product"

          def offer(d):
              o = d.get("offers") or {}
              if isinstance(o, list):
                  o = next((x for x in o if isinstance(x, dict)), {})
              if not isinstance(o, dict):
                  return {}
              nested = o.get("offers")
              if isinstance(nested, list):
                  return next((x for x in nested if isinstance(x, dict)), o)
              return o

          def images(d, page_url):
              raw = d.get("image")
              vals = []
              if isinstance(raw, str):
                  vals = [raw]
              elif isinstance(raw, dict):
                  vals = [txt(raw.get("url") or raw.get("contentUrl"))]
              elif isinstance(raw, list):
                  for x in raw:
                      if isinstance(x, str):
                          vals.append(x)
                      elif isinstance(x, dict):
                          vals.append(txt(x.get("url") or x.get("contentUrl")))
              vals = [urljoin(page_url, x) for x in vals if x]
              vals = list(dict.fromkeys(vals))
              return (vals[0] if vals else "", vals[1:11])

          def meta(soup, key, value):
              tag = soup.find("meta", attrs={key: value})
              return txt(tag.get("content")) if tag else ""

          def product_id(d, url):
              v = txt(
                  d.get("sku") or d.get("productID") or d.get("mpn")
                  or d.get("gtin13") or d.get("gtin14")
                  or d.get("gtin12") or d.get("gtin8")
              )
              if v:
                  return v[:50]
              slug = urlparse(url).path.rstrip("/").split("/")[-1]
              return (slug or hashlib.sha1(url.encode()).hexdigest())[:50]

          def extract(url, body):
              soup = BeautifulSoup(body, "html.parser")
              c = soup.find("link", rel="canonical")
              canonical = urljoin(url, c.get("href")) if c else url

              candidates = []
              for s in soup.find_all("script", type=lambda x: x and "ld+json" in x):
                  raw = s.string or s.get_text()
                  try:
                      data = json.loads(raw)
                  except Exception:
                      continue
                  candidates.extend(x for x in objects(data) if isinstance(x, dict) and is_product(x))

              if candidates:
                  d = candidates[0]
                  o = offer(d)
                  title = txt(d.get("name"))
                  desc = clean_desc(d.get("description"), meta(soup, "name", "description") or title)
                  img, extras = images(d, canonical)
                  if not img:
                      img = urljoin(canonical, meta(soup, "property", "og:image"))
                  curr = txt(o.get("priceCurrency") or d.get("priceCurrency") or "EUR")
                  p = price(o.get("price") or o.get("lowPrice") or d.get("price"), curr)
                  if title and img and p:
                      return {
                          "id": product_id(d, canonical),
                          "title": title[:150],
                          "description": desc,
                          "link": canonical,
                          "image_link": img,
                          "additional_images": extras,
                          "price": p,
                          "availability": availability(o.get("availability") or d.get("availability")),
                          "brand": txt(d.get("brand")) or None,
                          "gtin": txt(d.get("gtin") or d.get("gtin14") or d.get("gtin13") or d.get("gtin12") or d.get("gtin8")) or None,
                          "mpn": txt(d.get("mpn")) or None,
                      }

              title = meta(soup, "property", "og:title")
              img = meta(soup, "property", "og:image")
              amount = meta(soup, "property", "product:price:amount") or meta(soup, "property", "og:price:amount")
              curr = meta(soup, "property", "product:price:currency") or "EUR"
              p = price(amount, curr)
              if title and img and p:
                  return {
                      "id": product_id({}, canonical),
                      "title": title[:150],
                      "description": clean_desc(meta(soup, "property", "og:description"), title),
                      "link": canonical,
                      "image_link": urljoin(canonical, img),
                      "additional_images": [],
                      "price": p,
                      "availability": "in_stock",
                      "brand": None,
                      "gtin": None,
                      "mpn": None,
                  }
              return None

          def sitemap_urls(url, seen=None):
              seen = seen or set()
              if url in seen:
                  return []
              seen.add(url)
              r = session.get(url, timeout=30)
              r.raise_for_status()
              root = etree.fromstring(r.content)
              locs = [txt(x.text) for x in root.xpath("//*[local-name()='loc']") if txt(x.text)]
              if etree.QName(root).localname.lower() == "sitemapindex":
                  out = []
                  for child in locs:
                      out.extend(sitemap_urls(child, seen))
                  return out
              return locs

          urls = list(dict.fromkeys(sitemap_urls(SITEMAP)))
          products = []
          failed = []

          for i, url in enumerate(urls, 1):
              try:
                  r = session.get(url, timeout=30)
                  r.raise_for_status()
                  p = extract(r.url, r.text)
                  if p:
                      products.append(p)
                      print(f"[{i}/{len(urls)}] PRODUCT {p['title']}")
              except Exception as e:
                  failed.append(url)
                  print(f"[{i}/{len(urls)}] FAILED {url}: {e}")
              time.sleep(0.20)

          unique = {}
          for p in products:
              unique.setdefault(p["id"], p)
          products = list(unique.values())

          rss = etree.Element("rss", nsmap={"g": GNS}, version="2.0")
          channel = etree.SubElement(rss, "channel")
          etree.SubElement(channel, "title").text = "Vaivora.shop produktai"
          etree.SubElement(channel, "link").text = SHOP_URL
          etree.SubElement(channel, "description").text = "Google Merchant produktų srautas"

          def addg(parent, name, value):
              if value:
                  etree.SubElement(parent, f"{{{GNS}}}{name}").text = value

          for p in products:
              item = etree.SubElement(channel, "item")
              addg(item, "id", p["id"])
              etree.SubElement(item, "title").text = p["title"]
              etree.SubElement(item, "description").text = p["description"]
              etree.SubElement(item, "link").text = p["link"]
              addg(item, "image_link", p["image_link"])
              for x in p["additional_images"]:
                  addg(item, "additional_image_link", x)
              addg(item, "availability", p["availability"])
              addg(item, "price", p["price"])
              addg(item, "condition", "new")
              addg(item, "brand", p["brand"])
              addg(item, "gtin", p["gtin"])
              addg(item, "mpn", p["mpn"])
              if not any((p["brand"], p["gtin"], p["mpn"])):
                  addg(item, "identifier_exists", "no")

          OUTPUT.parent.mkdir(parents=True, exist_ok=True)
          etree.ElementTree(rss).write(
              str(OUTPUT),
              encoding="UTF-8",
              xml_declaration=True,
              pretty_print=True,
          )

          Path("feed-report.json").write_text(
              json.dumps({
                  "sitemap_urls": len(urls),
                  "products_written": len(products),
                  "failed_urls": failed,
                  "output": str(OUTPUT),
              }, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )

          if not products:
              raise SystemExit("Nerasta nė viena prekė. Reikia patikrinti produktų struktūrinius duomenis.")
          PY

          python /tmp/generate_feed.py

      - name: Commit generated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/products.xml feed-report.json
          git diff --cached --quiet || git commit -m "Update Merchant product feed"
          git push
