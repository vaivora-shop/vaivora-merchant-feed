name: Generate Google Merchant feed

'on':
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Atsisiųsti repozitoriją
        uses: actions/checkout@v4

      - name: Įjungti Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Įdiegti bibliotekas
        run: pip install -r requirements.txt

      - name: Sugeneruoti Merchant feed
        run: python generate_feed.py

      - name: Paruošti GitHub Pages failą
        run: |
          mkdir -p docs
          cp public/products.xml docs/products.xml
          touch docs/.nojekyll

      - name: Išsaugoti atnaujintą feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/products.xml docs/products.xml docs/.nojekyll feed-report.json
          git diff --cached --quiet || git commit -m "Update Google Merchant feed"
          git push
